server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: profile-service

  datasource:
    url: ${DATASOURCE_URL:jdbc:mysql://localhost:23306/social}
    username: ${DATASOURCE_USERNAME:dev_user}
    password: ${DATASOURCE_PASSWORD:dev_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  metrics:
    tags:
      application: ${spring.application.name}
